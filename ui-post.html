<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI Post Display From API</title>
    <style>
        #post-container{
           max-width: 1160px;
           margin: 0 auto;
           display: grid;
           grid-template-columns: repeat(3, 1fr);
           gap: 30px;
        }
        .post-card{
            height: 100%;
            border: 1px solid #ddd;
            box-shadow: 1px 1px 1px 1px gray;
            padding: 10px;
            border-radius: 10px;
        }
        .post-card p{
            text-align: justify;
        }
 
    </style>
</head>
<body>
    <button id="load-post" onclick="loadPost()">Load Post</button>

    <div id="post-container">
      
    </div>
    <!-- link js -->
     <script src="./ui-post.js"></script>
</body>
</html>
